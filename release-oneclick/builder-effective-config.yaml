directories:
  output: release-oneclick
  buildResources: resources
appId: app.logicclaw.desktop
productName: EasyClaw
copyright: Copyright © 2026 EasyClaw
compression: maximum
artifactName: ${name}-${version}-${os}-${arch}.${ext}
files:
  - filter:
      - dist
      - dist-electron
      - package.json
extraResources:
  - from: resources/
    to: resources/
    filter:
      - '**/*'
      - '!icons/*.md'
      - '!icons/*.svg'
      - '!bin/**'
      - '!screenshot/**'
  - from: build/openclaw/
    to: openclaw/
afterPack: ./scripts/after-pack.cjs
asar: true
asarUnpack:
  - '**/*.node'
npmRebuild: false
publish:
  - provider: generic
    url: https://oss.intelli-spectrum.com/latest
    useMultipleRangeRequest: false
  - provider: github
    owner: XuHongFeii2
    repo: claw
mac:
  extraResources:
    - from: resources/bin/darwin-${arch}
      to: bin
    - from: resources/cli/posix/
      to: cli/
  category: public.app-category.productivity
  icon: resources/icons/icon.icns
  identity: null
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  darkModeSupport: true
  hardenedRuntime: false
  gatekeeperAssess: false
  entitlements: entitlements.mac.plist
  entitlementsInherit: entitlements.mac.plist
  notarize: false
  extendInfo:
    NSMicrophoneUsageDescription: ClawX requires microphone access for voice features
    NSCameraUsageDescription: ClawX requires camera access for video features
dmg:
  background: resources/dmg-background.png
  icon: resources/icons/icon.icns
  iconSize: 100
  window:
    width: 540
    height: 380
  contents:
    - type: file
      x: 130
      'y': 220
    - type: link
      path: /Applications
      x: 410
      'y': 220
win:
  forceCodeSigning: false
  verifyUpdateCodeSignature: false
  signAndEditExecutable: true
  extraResources:
    - from: resources/bin/win32-${arch}
      to: bin
    - from: resources/cli/win32/
      to: cli/
  icon: resources/icons/icon.ico
  target:
    - target: nsis
      arch:
        - x64
        - arm64
nsis:
  oneClick: false
  perMachine: false
  warningsAsErrors: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  differentialPackage: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: EasyClaw
  uninstallDisplayName: EasyClaw
  license: LICENSE
  include: scripts/installer.nsh
  installerIcon: resources/icons/icon.ico
  uninstallerIcon: resources/icons/icon.ico
  installerLanguages:
    - zh_CN
    - en_US
  multiLanguageInstaller: true
linux:
  extraResources:
    - from: resources/bin/linux-${arch}
      to: bin
    - from: resources/cli/posix/
      to: cli/
  icon: resources/icons
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
    - target: deb
      arch:
        - x64
        - arm64
    - target: rpm
      arch:
        - x64
        - arm64
  category: Utility
  maintainer: EasyClaw团队 <public@valuecell.ai>
  vendor: EasyClaw
  synopsis: AI Assistant powered by OpenClaw
  description: |
    EasyClaw is a graphical AI assistant application that integrates with
    OpenClaw Gateway to provide intelligent automation and assistance
    across multiple messaging platforms.
  desktop:
    entry:
      Name: EasyClaw
      Comment: AI Assistant powered by OpenClaw
      Categories: Utility;Network;
      Keywords: ai;assistant;automation;chat;
appImage:
  license: LICENSE
deb:
  depends:
    - libgtk-3-0
    - libnotify4
    - libnss3
    - libxss1
    - libxtst6
    - xdg-utils
    - libatspi2.0-0
    - libuuid1
  afterInstall: scripts/linux/after-install.sh
  afterRemove: scripts/linux/after-remove.sh
electronVersion: 40.6.0
